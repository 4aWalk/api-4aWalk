name: CI/CD Docker API & Quality

# Déclenché sur chaque push vers main (production) ou integration (recette)
on:
  push:
    branches:
      - main
      - integration

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:

      # Clone le dépôt complet. fetch-depth: 0 est nécessaire pour que SonarQube
      # puisse analyser tout l'historique Git et calculer les métriques différentielles.
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Important pour SonarQube afin d'analyser tout l'historique Git

      # Installe le JDK Temurin 21, requis pour compiler le projet Maven et lancer SonarQube.
      # L'option cache: maven évite de re-télécharger les dépendances à chaque build.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' 
          cache: 'maven'

      # Met en cache les plugins et règles SonarQube pour accélérer les analyses futures.
      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Compile le projet, exécute les tests unitaires et envoie les résultats à SonarCloud.
      # GITHUB_TOKEN permet à Sonar de commenter les PRs, SONAR_TOKEN authentifie l'envoi.
      - name: Build, Test and Analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=4aWalk_api-4aWalk -Dsonar.organization=4awalk -Dsonar.host.url=https://sonarcloud.io

      # Authentifie le runner sur Docker Hub pour pouvoir publier l'image.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Construit l'image Docker depuis la racine du projet et la pousse sur Docker Hub avec le tag latest.
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: sae/4awalk-api:latest

      # Se connecte au serveur AWS via SSH et redéploie le container avec la nouvelle image.
      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            cd ~/project
            # On force la récupération de la nouvelle image
            docker compose pull api-4awalk
            # On redémarre le container avec la nouvelle version du code
            docker compose up -d api-4awalk
            # Nettoyage des vieilles images pour ne pas saturer le disque
            docker image prune -f
